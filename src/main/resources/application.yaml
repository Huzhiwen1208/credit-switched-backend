server: 
  port: 8081
  error:
    include-message: always
spring:
  # ==========================================
  # 1. 新增：数据库连接配置
  # ==========================================
  datasource:
    # 连接你的 Docker MySQL (确保 myapp_db 库已存在)
    url: jdbc:mysql://localhost:3306/myapp_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: app_user
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================================
  # 2. 邮件配置
  # ==========================================
  mail:
    host: smtp.qq.com
    username: 2587879285@qq.com
    password: cwhjksudhpjjecgg
    title: "界面注册验证码"
    template: "您的注册验证码为：%s，五分钟内有效"
        properties:
          mail:
            smtp:
              auth: true
          starttls:
            enable: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms

  # ==========================================
  # 2. 新增：MyBatis-Plus 配置
  # ==========================================
  mybatis-plus:
    configuration:
      # 开启控制台打印 SQL，方便调试
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      # 自动将数据库下划线字段 (user_name) 映射为 Java 驼峰字段 (userName)
      map-underscore-to-camel-case: true
    
    global-config:
      db-config:
        # 全局主键策略：使用雪花算法生成唯一 ID
        id-type: assign_id

auth:
  handler:
    email: "email"
    code: "code"
    password: "password"
    email-code-key: "EMAIL_CODE_KEY"
    register-email-key: "REGISTER_EMAIL"
    captcha-key: "captcha"
    login-user-key: "LOGIN_USER"
    msgEmailCaptchaError: "邮箱验证码错误或过期"
    msgRegisterEmailError: "注册邮箱与发送验证码邮箱不一致"
    msgImageCaptchaError: "图片验证码错误或过期"
    msgLoginSuccess: "登录成功"
    msgEmailRegisted: "该邮箱已注册"
    msgRegisterSuccess: "注册成功"
    msgEmailNotRegistered: "该邮箱未注册"
    msgPasswordError: "密码错误"
    badRequestCode: 400
    successCode: 200

captch:
  captchaStr: "captcha"
  pragma: "Pragma"
  no-cache: "No-cache"
  cache-control: "Cache-Control"
  expires: "Expires"
  content-type: "image/jpeg"
  jpeg: "jpeg"

emailservice:
  captcha-str: "captcha"
  email-code-key: "email"
  session-email_code: "EMAIL_CODE_KEY"
  session-register-email: "REGISTER_EMAIL"
  msgImageError: "图片验证码错误或者过期"
  msgEmailSendSucess: "邮箱验证码发送成功"
